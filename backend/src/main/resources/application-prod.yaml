quarkus:
  http:
    cors:
      origins: ${CORS_ORIGIN}
      headers: accept,authorization,content-type,x-requested-with
      methods: GET,POST,PUT,DELETE,OPTIONS
    auth:
      permission:
        openapi:
          paths: /q/openapi,/q/swagger-ui/*
          policy: permit
  datasource:
    db-kind: postgresql
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    jdbc:
      url: ${DATABASE_URL}
  hibernate-orm:
    physical-naming-strategy: es.danifalconr.infrastructure.config.SnakeCasePhysicalNamingStrategy
    database:
      generation: validate
  swagger-ui:
    always-include: true
    urls:
      default: ${SWAGGER_OPENAPI_URL:/q/openapi}
  smallrye-openapi:
    info-title: Online CV API
    info-version: 1.0.0
    info-description: REST API for personal online CV

mp:
  jwt:
    verify:
      publickey:
        location: publicKey.pem
      issuer: ${JWT_ISSUER:https://online-cv.danifalconr.es}

smallrye:
  jwt:
    sign:
      key:
        location: privateKey.pem

app:
  admin:
    username: ${ADMIN_USERNAME}
    password: ${ADMIN_PASSWORD}
  jwt:
    duration: ${JWT_DURATION:3600}
